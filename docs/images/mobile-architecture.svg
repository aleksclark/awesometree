<svg xmlns="http://www.w3.org/2000/svg" width="720" height="320" viewBox="0 0 720 320">
  <style>
    text { font-family: 'Segoe UI', system-ui, sans-serif; }
    .title { font-size: 13px; font-weight: 600; }
    .label { font-size: 11px; fill: #6c7086; }
    .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }
  </style>

  <rect width="720" height="320" rx="8" fill="#11111b"/>

  <!-- Phone frame -->
  <rect x="20" y="20" width="160" height="280" rx="16" fill="#1e1e2e" stroke="#45475a" stroke-width="2"/>
  <rect x="62" y="26" width="76" height="6" rx="3" fill="#313244"/>

  <!-- Bottom nav bar -->
  <rect x="22" y="258" width="156" height="40" rx="0" fill="#181825"/>
  <rect x="22" y="280" width="156" height="18" rx="14" fill="#181825"/>

  <!-- Nav icons -->
  <text x="38" y="278" font-family="'Segoe UI'" font-size="8" fill="#89b4fa" font-weight="bold">WS</text>
  <text x="68" y="278" font-family="'Segoe UI'" font-size="8" fill="#6c7086">Proj</text>
  <text x="98" y="278" font-family="'Segoe UI'" font-size="8" fill="#6c7086">Agent</text>
  <text x="132" y="278" font-family="'Segoe UI'" font-size="8" fill="#6c7086">Set</text>

  <!-- Workspace list content -->
  <text x="32" y="56" class="title" fill="#cdd6f4">Workspaces</text>

  <!-- WS item 1: active -->
  <circle cx="38" cy="78" r="4" fill="#a6e3a1"/>
  <text x="48" y="81" class="mono" fill="#cdd6f4" font-size="9">make-docs-fancy</text>
  <text x="48" y="92" class="label" font-size="8">awesometree</text>
  <text x="132" y="81" class="mono" fill="#89b4fa" font-size="8">ACP</text>

  <!-- WS item 2: active -->
  <circle cx="38" cy="110" r="4" fill="#a6e3a1"/>
  <text x="48" y="113" class="mono" fill="#cdd6f4" font-size="9">some-cool-thing</text>
  <text x="48" y="124" class="label" font-size="8">curri</text>

  <!-- WS item 3: inactive -->
  <circle cx="38" cy="142" r="4" fill="#45475a"/>
  <text x="48" y="145" class="mono" fill="#6c7086" font-size="9">remote-protocol</text>
  <text x="48" y="156" class="label" font-size="8">awesometree</text>

  <!-- WS item 4: inactive -->
  <circle cx="38" cy="174" r="4" fill="#45475a"/>
  <text x="48" y="177" class="mono" fill="#6c7086" font-size="9">mgmt-api</text>
  <text x="48" y="188" class="label" font-size="8">blockyard</text>

  <!-- Arrow: phone to server -->
  <line x1="180" y1="130" x2="238" y2="130" stroke="#89b4fa" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#ab)"/>
  <text x="188" y="122" class="label" font-size="10">REST API</text>
  <text x="188" y="144" class="label" font-size="10">:9099</text>

  <!-- Server box -->
  <rect x="240" y="50" width="200" height="160" rx="8" fill="#1e1e2e" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="260" y="76" class="title" fill="#a6e3a1">awesometree-daemon</text>

  <rect x="256" y="88" width="168" height="28" rx="4" fill="#181825"/>
  <text x="268" y="107" class="mono" fill="#cdd6f4">GET /api/workspaces</text>

  <rect x="256" y="122" width="168" height="28" rx="4" fill="#181825"/>
  <text x="268" y="141" class="mono" fill="#cdd6f4">POST /api/workspaces</text>

  <rect x="256" y="156" width="168" height="28" rx="4" fill="#181825"/>
  <text x="268" y="175" class="mono" fill="#cdd6f4">POST /acp/{ws}/stream</text>

  <!-- QR code pairing flow -->
  <rect x="240" y="230" width="200" height="70" rx="8" fill="#1e1e2e" stroke="#f9e2af" stroke-width="1"/>
  <text x="260" y="254" class="title" fill="#f9e2af">QR Pairing</text>
  <text x="260" y="272" class="mono" fill="#cdd6f4" font-size="10">1. Tray → Show QR</text>
  <text x="260" y="286" class="mono" fill="#cdd6f4" font-size="10">2. Phone scans HMAC token</text>

  <line x1="100" y1="240" x2="238" y2="260" stroke="#f9e2af" stroke-width="1" stroke-dasharray="3"/>

  <!-- ACP proxy flow -->
  <rect x="480" y="50" width="220" height="100" rx="8" fill="#1e1e2e" stroke="#cba6f7" stroke-width="1"/>
  <text x="500" y="76" class="title" fill="#cba6f7">ACP Agent</text>
  <text x="500" y="96" class="mono" fill="#cdd6f4" font-size="10">Streaming NDJSON chat</text>
  <text x="500" y="112" class="mono" fill="#cdd6f4" font-size="10">Per-workspace sessions</text>
  <text x="500" y="128" class="mono" fill="#6c7086" font-size="10">message.part → real-time</text>

  <line x1="440" y1="100" x2="478" y2="100" stroke="#cba6f7" stroke-width="1.5" marker-end="url(#ap)"/>

  <!-- Core library note -->
  <rect x="480" y="170" width="220" height="60" rx="8" fill="#1e1e2e" stroke="#313244" stroke-width="1"/>
  <text x="500" y="194" class="title" fill="#89b4fa">awesometree-core</text>
  <text x="500" y="210" class="mono" fill="#6c7086" font-size="10">Rust + UniFFI → Kotlin</text>
  <text x="500" y="222" class="mono" fill="#6c7086" font-size="10">Shared API client lib</text>

  <defs>
    <marker id="ab" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#89b4fa" stroke-width="1"/>
    </marker>
    <marker id="ap" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#cba6f7" stroke-width="1"/>
    </marker>
  </defs>
</svg>
