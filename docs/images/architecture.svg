<svg xmlns="http://www.w3.org/2000/svg" width="760" height="440" viewBox="0 0 760 440">
  <style>
    text { font-family: 'Segoe UI', system-ui, sans-serif; }
    .title { font-size: 13px; font-weight: 600; fill: #cdd6f4; }
    .label { font-size: 11px; fill: #6c7086; }
    .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #cdd6f4; }
    .accent { fill: #89b4fa; }
    .green { fill: #a6e3a1; }
    .pink { fill: #f38ba8; }
    .yellow { fill: #f9e2af; }
  </style>

  <rect width="760" height="440" rx="8" fill="#11111b"/>

  <!-- Hotkey -->
  <rect x="20" y="20" width="120" height="50" rx="8" fill="#1e1e2e" stroke="#89b4fa" stroke-width="2"/>
  <text x="44" y="42" class="title accent">Super+O</text>
  <text x="35" y="58" class="label">press hotkey</text>

  <!-- Arrow 1 -->
  <line x1="140" y1="45" x2="178" y2="45" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- CLI -->
  <rect x="180" y="20" width="150" height="50" rx="8" fill="#1e1e2e" stroke="#313244" stroke-width="1"/>
  <text x="195" y="42" class="mono">awesometree pick</text>
  <text x="215" y="58" class="label">CLI binary</text>

  <!-- Arrow 2 -->
  <line x1="330" y1="45" x2="368" y2="45" stroke="#6c7086" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="332" y="38" class="label">socket</text>

  <!-- Daemon -->
  <rect x="370" y="12" width="170" height="66" rx="8" fill="#1e1e2e" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="400" y="36" class="title green">awesometree-daemon</text>
  <text x="398" y="52" class="label">GPUI app + HTTP server</text>
  <text x="404" y="66" class="label">+ tray icon + socket</text>

  <!-- Arrow 3 -->
  <line x1="455" y1="78" x2="455" y2="108" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Picker Window -->
  <rect x="370" y="110" width="170" height="50" rx="8" fill="#1e1e2e" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="405" y="132" class="title accent">GPUI Picker</text>
  <text x="390" y="148" class="label">fuzzy search + select</text>

  <!-- Arrow 4 (user selects) -->
  <line x1="455" y1="160" x2="455" y2="195" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="462" y="182" class="label">user selects</text>

  <!-- Manager::up -->
  <rect x="350" y="198" width="210" height="66" rx="8" fill="#1e1e2e" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="395" y="220" class="title yellow">Manager::up()</text>
  <text x="365" y="238" class="mono" style="font-size:10px">1. git worktree add</text>
  <text x="365" y="252" class="mono" style="font-size:10px">2. create WM tag</text>

  <!-- Three outputs from Manager::up -->
  <!-- Left: Git worktree -->
  <line x1="390" y1="264" x2="140" y2="340" stroke="#f9e2af" stroke-width="1" stroke-dasharray="4"/>
  <rect x="30" y="320" width="220" height="56" rx="8" fill="#1e1e2e" stroke="#313244" stroke-width="1"/>
  <text x="50" y="343" class="mono" style="font-size:10px">~/worktrees/myrepo/feature-x/</text>
  <text x="90" y="360" class="label">git worktree checkout</text>

  <!-- Center: WM Tag -->
  <line x1="455" y1="264" x2="455" y2="324" stroke="#f9e2af" stroke-width="1" stroke-dasharray="4"/>
  <rect x="350" y="326" width="210" height="50" rx="8" fill="#1e1e2e" stroke="#313244" stroke-width="1"/>
  <text x="375" y="348" class="mono" style="font-size:10px">P:feature-x  (virtual desktop)</text>
  <text x="392" y="364" class="label">AwesomeWM / yabai tag</text>

  <!-- Right: Zed -->
  <line x1="520" y1="264" x2="670" y2="325" stroke="#f9e2af" stroke-width="1" stroke-dasharray="4"/>
  <rect x="580" y="326" width="160" height="50" rx="8" fill="#1e1e2e" stroke="#313244" stroke-width="1"/>
  <text x="622" y="348" class="title">Zed Editor</text>
  <text x="600" y="364" class="label">opens in worktree dir</text>

  <!-- Mobile / REST column -->
  <rect x="600" y="12" width="140" height="80" rx="8" fill="#1e1e2e" stroke="#313244" stroke-width="1"/>
  <text x="624" y="34" class="title">REST API</text>
  <text x="618" y="50" class="label">:9099 workspace</text>
  <text x="630" y="64" class="label">CRUD + ACP</text>
  <text x="628" y="80" class="label">proxy</text>

  <line x1="540" y1="45" x2="598" y2="45" stroke="#6c7086" stroke-width="1" stroke-dasharray="3" marker-end="url(#arrow)"/>

  <!-- Mobile app -->
  <rect x="610" y="110" width="120" height="50" rx="8" fill="#1e1e2e" stroke="#6c7086" stroke-width="1"/>
  <text x="625" y="132" class="label" style="font-size:12px">Android App</text>
  <text x="622" y="148" class="label">QR code pairing</text>

  <line x1="670" y1="92" x2="670" y2="108" stroke="#6c7086" stroke-width="1" stroke-dasharray="3" marker-end="url(#arrow)"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#6c7086" stroke-width="1"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#89b4fa" stroke-width="1"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#a6e3a1" stroke-width="1"/>
    </marker>
  </defs>
</svg>
