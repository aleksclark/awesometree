<svg xmlns="http://www.w3.org/2000/svg" width="600" height="200" viewBox="0 0 600 200">
  <style>
    .key { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700; fill: #1e1e2e; }
    .desc { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 11px; fill: #cdd6f4; }
    .sub { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: #6c7086; }
  </style>

  <rect width="600" height="200" rx="8" fill="#11111b"/>

  <!-- Key 1: Super+O -->
  <rect x="20" y="20" width="90" height="36" rx="6" fill="#89b4fa"/>
  <text x="35" y="43" class="key">Super+O</text>
  <text x="20" y="72" class="desc">Open Picker</text>
  <text x="20" y="86" class="sub">fuzzy find + select</text>

  <!-- Key 2: Super+I -->
  <rect x="140" y="20" width="86" height="36" rx="6" fill="#a6e3a1"/>
  <text x="157" y="43" class="key">Super+I</text>
  <text x="140" y="72" class="desc">Create Form</text>
  <text x="140" y="86" class="sub">new workspace</text>

  <!-- Key 3: Super+D -->
  <rect x="256" y="20" width="94" height="36" rx="6" fill="#f38ba8"/>
  <text x="270" y="43" class="key">Super+D</text>
  <text x="256" y="72" class="desc">Destroy</text>
  <text x="256" y="86" class="sub">dirty-check first</text>

  <!-- Key 4: Super+J -->
  <rect x="380" y="20" width="88" height="36" rx="6" fill="#f9e2af"/>
  <text x="396" y="43" class="key">Super+J</text>
  <text x="380" y="72" class="desc">Close</text>
  <text x="380" y="86" class="sub">keep worktree</text>

  <!-- Key 5: Super+L -->
  <rect x="498" y="20" width="86" height="36" rx="6" fill="#cba6f7"/>
  <text x="513" y="43" class="key">Super+L</text>
  <text x="498" y="72" class="desc">Cycle</text>
  <text x="498" y="86" class="sub">next project tag</text>

  <!-- Picker sub-keys -->
  <text x="20" y="120" font-family="'Segoe UI', sans-serif" font-size="13" fill="#89b4fa" font-weight="600">Inside the Picker</text>

  <rect x="20" y="134" width="40" height="24" rx="4" fill="#45475a"/>
  <text x="29" y="150" font-family="JetBrains Mono, monospace" font-size="10" fill="#cdd6f4">↑ ↓</text>
  <text x="68" y="150" class="sub">navigate</text>

  <rect x="140" y="134" width="50" height="24" rx="4" fill="#45475a"/>
  <text x="147" y="150" font-family="JetBrains Mono, monospace" font-size="10" fill="#cdd6f4">Enter</text>
  <text x="198" y="150" class="sub">open</text>

  <rect x="256" y="134" width="60" height="24" rx="4" fill="#45475a"/>
  <text x="262" y="150" font-family="JetBrains Mono, monospace" font-size="10" fill="#cdd6f4">Ctrl+N</text>
  <text x="324" y="150" class="sub">create new</text>

  <rect x="404" y="134" width="60" height="24" rx="4" fill="#45475a"/>
  <text x="410" y="150" font-family="JetBrains Mono, monospace" font-size="10" fill="#cdd6f4">Ctrl+D</text>
  <text x="472" y="150" class="sub">destroy</text>

  <rect x="20" y="166" width="40" height="24" rx="4" fill="#45475a"/>
  <text x="29" y="182" font-family="JetBrains Mono, monospace" font-size="10" fill="#cdd6f4">Esc</text>
  <text x="68" y="182" class="sub">close picker</text>

  <rect x="174" y="166" width="40" height="24" rx="4" fill="#45475a"/>
  <text x="183" y="182" font-family="JetBrains Mono, monospace" font-size="10" fill="#cdd6f4">Tab</text>
  <text x="222" y="182" class="sub">next item / field</text>
</svg>
