<text x="20" y="56" font-family="JetBrains Mono,Menlo,monospace" font-size="13"><tspan fill="#a6e3a1">$</tspan><tspan fill="#cdd6f4"> awesometree --help</tspan></text>
<text x="20" y="82" font-family="JetBrains Mono,Menlo,monospace" font-size="12"><tspan fill="#cdd6f4">Workspace manager for window managers + Zed + git worktrees</tspan></text>
