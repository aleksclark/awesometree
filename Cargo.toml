[package]
name = "awesometree"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "awesometree"
path = "src/main.rs"

[[bin]]
name = "awesometree-daemon"
path = "src/daemon_main.rs"

[dependencies]
axum = "0.8"
clap = { version = "4.5.60", features = ["derive"] }
gpui = "0.2.2"
hyper = { version = "1", features = ["full"] }
hyper-util = { version = "0.1", features = ["client-legacy", "tokio"] }
http-body-util = "0.1"
image = { version = "0.25", default-features = false, features = ["png"] }
libc = "0.2"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tokio = { version = "1", features = ["full"] }
tray = "0.1"
tray-menu = { version = "0.1", features = ["gtk"] }
gtk = "0.18"
futures-channel = "0.3"
futures-util = "0.3"
unicode-segmentation = "1.11"
glob = "0.3"
utoipa = "5"
utoipa-axum = "0.2"
